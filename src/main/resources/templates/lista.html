<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ferramentas</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">

    <div class="container my-5" style="max-width: 1000px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0 text-secondary">
                <i class="bi bi-tools text-primary me-2"></i>Lista de Ferramentas
            </h2>
            <button class="btn btn-primary shadow-sm fw-semibold" type="button" data-bs-toggle="collapse" data-bs-target="#formCadastro">
                <i class="bi bi-plus-lg me-1"></i> Nova Ferramenta
            </button>
        </div>

        <div class="collapse mb-4" id="formCadastro">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3 text-dark">Cadastrar Nova Ferramenta</h5>
                    
                    <form th:action="@{/ferramentas/salvar}" th:object="${ferramenta}" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-muted">Nome da Ferramenta</label>
                                <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Furadeira de Impacto" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-medium text-muted">Horas de Uso</label>
                                <input type="number" class="form-control" th:field="*{horasUso}" min="0" value="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-medium text-muted">Vida Útil Máxima</label>
                                <input type="number" class="form-control" th:field="*{vidaUtilMax}" min="1" placeholder="Ex: 200" required>
                            </div>
                        </div>
                        <div class="mt-4 d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light border fw-medium" data-bs-toggle="collapse" data-bs-target="#formCadastro">Cancelar</button>
                            <button type="submit" class="btn btn-success px-4 fw-semibold">Salvar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4" style="width: 10%;">ID</th>
                            <th style="width: 45%;">Nome</th>
                            <th style="width: 22%;">Horas de Uso</th>
                            <th class="pe-4" style="width: 23%;">Vida Útil Máx</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="f : ${ferramentas}">
                            <td class="ps-4 fw-bold text-muted" th:text="${f.id_ferramenta}"></td>
                            <td class="fw-semibold text-dark" th:text="${f.nome}"></td>
                            <td>
                                <span class="badge bg-secondary-subtle text-secondary px-2 py-1" th:text="${f.horasUso} + ' h'"></span>
                            </td>
                            <td class="pe-4">
                                <span class="badge bg-info-subtle text-info px-2 py-1" th:text="${f.vidaUtilMax} + ' h'"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ferramentas)}">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="bi bi-box-open fs-2 d-block mb-2 text-secondary"></i>
                                Nenhuma ferramenta cadastrada no momento.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
