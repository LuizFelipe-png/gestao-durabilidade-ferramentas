<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastrar Ferramenta</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">

    <div class="container my-5" style="max-width: 700px;">
        
        <div class="mb-4">
            <h2 class="fw-bold m-0 text-secondary">
                <i class="bi bi-tools text-primary me-2"></i>Cadastrar Nova Ferramenta
            </h2>
            <p class="text-muted small mb-0 mt-1">Preencha as informações abaixo para registrar o equipamento no sistema.</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                
                <form th:action="@{/ferramentas/salvar}" th:object="${ferramenta}" method="POST">
                    <div class="row g-3">
                        
                        <div class="col-12">
                            <label class="form-label fw-medium text-muted">Nome da Ferramenta</label>
                            <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Torno Mecânico Horizontal" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-medium text-muted">Horas de Uso Inicial</label>
                            <input type="number" class="form-control" th:field="*{horasUso}" min="0" value="0" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-medium text-muted">Vida Útil Máxima (Horas)</label>
                            <input type="number" class="form-control" th:field="*{vidaUtilMax}" min="1" placeholder="Ex: 5000" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-medium text-muted">Status</label>
                            <select class="form-select" th:field="*{status}" required>
                                <option value="Em funcionamento">Em funcionamento</option>
                                <option value="Parada">Parada</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium text-muted">ID do Galpão Alocado</label>
                            <input type="number" class="form-control" th:field="*{idGalpao}" placeholder="Ex: 1" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-medium text-muted">ID do Usuário Responsável</label>
                            <input type="number" class="form-control" th:field="*{idUsuario}" placeholder="Ex: 2" required>
                        </div>

                    </div>
                    
                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                        <a th:href="@{/ferramentas}" class="btn btn-light border fw-medium px-4">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-success px-4 fw-semibold shadow-sm">
                            <i class="bi bi-check-lg me-1"></i>Salvar no Banco
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
